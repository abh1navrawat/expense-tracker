<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Expenses Log', ~{::div#expensesBody})}">
<body>
<div id="expensesBody">

    <!-- Header Section -->
    <div class="dashboard-header">
        <div>
            <h1>Expenses Ledger</h1>
            <p>Analyze, filter, and purge items from your personal transaction log.</p>
        </div>
        <div>
            <button class="btn btn-primary" onclick="openModal('addExpenseModal')">
                <svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span>Record Expense</span>
            </button>
        </div>
    </div>

    <!-- Filter Navigation Deck -->
    <div class="card filter-bar">
        <div style="flex: 1.5; min-width: 200px;">
            <label class="form-label" style="font-size:0.75rem; margin-bottom: 0.25rem;">Keyword Search</label>
            <input class="form-control" type="text" id="filterSearch" placeholder="Search description...">
        </div>
        <div style="flex: 1; min-width: 150px;">
            <label class="form-label" style="font-size:0.75rem; margin-bottom: 0.25rem;">Category Segment</label>
            <select class="form-control" id="filterCategory">
                <option value="">All Categories</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <div style="flex: 1; min-width: 120px;">
            <label class="form-label" style="font-size:0.75rem; margin-bottom: 0.25rem;">Start Date</label>
            <input class="form-control" type="date" id="filterStart">
        </div>
        <div style="flex: 1; min-width: 120px;">
            <label class="form-label" style="font-size:0.75rem; margin-bottom: 0.25rem;">End Date</label>
            <input class="form-control" type="date" id="filterEnd">
        </div>
    </div>

    <!-- Ledger Table Container -->
    <div class="card" style="padding: 1.5rem; margin-bottom: 2rem;">
        <div class="table-container">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th style="text-align: right;">Raw Cost</th>
                        <th style="text-align: right;">Converted Cost</th>
                        <th style="text-align: center; width: 100px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="expensesGridBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: hsl(var(--muted-foreground)); padding: 3rem;">Loading expenses grid records...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Reused Add Expense Dialog Modal -->
    <div id="addExpenseModal" class="modal">
        <div class="modal-backdrop" onclick="closeModal('addExpenseModal')"></div>
        <div class="card modal-content">
            <h3 style="font-weight: 700; margin-bottom: 1.25rem;">Record New Expense</h3>
            <form id="addExpenseForm">
                <div class="form-group">
                    <label class="form-label" for="amount">Expense Cost</label>
                    <div style="display:flex; gap:0.5rem;">
                        <input class="form-control" type="number" step="0.01" id="amount" name="amount" placeholder="12.50" style="flex:2;" required>
                        <select class="form-control" name="currency" style="flex:1;" required>
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                            <option value="INR">INR (₹)</option>
                            <option value="GBP">GBP (£)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="categoryId">Category Segment</label>
                    <select class="form-control category-select" id="categoryId" name="categoryId" required>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="description">Expense Description</label>
                    <input class="form-control" type="text" id="description" name="description" placeholder="Lunch" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label" for="expenseDate">Expense Date</label>
                    <input class="form-control" type="date" id="expenseDate" name="expenseDate" th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" required>
                </div>

                <div style="display:flex; justify-content:flex-end; gap:0.5rem;">
                    <button type="button" class="btn btn-outline" onclick="closeModal('addExpenseModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Expense</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Interactive Grid Management Scripts -->
    <script>
        function loadExpensesGrid() {
            const catId = document.getElementById('filterCategory').value;
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;
            const search = document.getElementById('filterSearch').value;

            const tbody = document.getElementById('expensesGridBody');
            if (!tbody) return;

            let url = `/api/expenses?`;
            if (catId) url += `categoryId=${catId}&`;
            if (start) url += `start=${start}&`;
            if (end) url += `end=${end}&`;
            if (search) url += `search=${encodeURIComponent(search)}&`;

            fetch(url)
                .then(res => {
                    if (res.status === 401) {
                        window.location.href = '/login';
                        return;
                    }
                    if (!res.ok) {
                        throw new Error(`Server returned HTTP ${res.status}`);
                    }
                    return res.json();
                })
                .then(data => {
                    if (!data) return;
                    tbody.innerHTML = '';
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:hsl(var(--muted-foreground)); padding:3rem;">No expense statements found matching selected filters.</td></tr>';
                        return;
                    }
                    data.forEach(exp => {
                        // Extract base currency safely via Thymeleaf context variable injection directly
                        const baseCurrencyCode = '[[${user.baseCurrency}]]';
                        const categoryName = exp.category && exp.category.name ? exp.category.name : 'Uncategorized';
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${exp.expenseDate}</td>
                            <td>${categoryName}</td>
                            <td>${exp.description}</td>
                            <td style="text-align:right;">${exp.currency} ${exp.amount.toFixed(2)}</td>
                            <td class="amount-indicator expense" style="text-align:right;">${baseCurrencyCode} ${exp.convertedAmountBase.toFixed(2)}</td>
                            <td style="text-align:center;">
                                <button class="btn btn-danger" style="padding:0 0.5rem; height: 26px; font-size:0.7rem;" onclick="deleteExpenseRecord(${exp.id})">Delete</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => console.error('Failed to load expenses grid', err));
        }

        function deleteExpenseRecord(id) {
            if (!confirm('Are you sure you want to delete this expense statement?')) return;
            fetch(`/api/expenses/${id}`, { method: 'DELETE' })
                .then(res => {
                    if (res.ok) {
                        showToast('Expense statement deleted successfully.', 'success');
                        loadExpensesGrid();
                    } else {
                        showToast('Failed to delete expense statement.', 'danger');
                    }
                });
        }

        // Auto loaded triggers
        document.addEventListener('DOMContentLoaded', () => {
            loadExpensesGrid();
            
            document.getElementById('filterCategory').addEventListener('change', loadExpensesGrid);
            document.getElementById('filterStart').addEventListener('change', loadExpensesGrid);
            document.getElementById('filterEnd').addEventListener('change', loadExpensesGrid);
            document.getElementById('filterSearch').addEventListener('input', loadExpensesGrid);
        });
    </script>

</div>
</body>
</html>
