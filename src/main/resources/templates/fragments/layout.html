<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Expense Tracker'"></title>
    
    <!-- Link styles.css and external CDNs -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <!-- Chart.js for premium analytics rendering -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-container">
        
        <!-- Premium Sidebar Menu -->
        <aside class="sidebar">
            <a href="/" class="sidebar-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <span>Fintrack</span>
            </a>
            
            <nav class="sidebar-menu" sec:authorize="isAuthenticated()">
                <a href="/dashboard" class="sidebar-link" th:classappend="${activeTab == 'dashboard'} ? 'active' : ''">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="/expenses" class="sidebar-link" th:classappend="${activeTab == 'expenses'} ? 'active' : ''">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                    <span>Expenses Ledger</span>
                </a>
                <a href="/analytics" class="sidebar-link" th:classappend="${activeTab == 'analytics'} ? 'active' : ''">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/>
                        <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
                    </svg>
                    <span>Analytics</span>
                </a>
                <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard" class="sidebar-link" th:classappend="${activeTab == 'admin'} ? 'active' : ''">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <span>Admin Panel</span>
                </a>
            </nav>
            
            <div class="sidebar-footer" sec:authorize="isAuthenticated()">
                <div style="font-size: 0.8rem; font-weight:600; color: hsl(var(--foreground)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" th:text="${#authentication.name}">
                    user@tracker.com
                </div>
                <a href="/logout" class="btn btn-outline" style="width: 100%; height: 32px; font-size: 0.8rem;">Logout</a>
                <form th:action="@{/account/delete}" method="POST" onsubmit="return confirm('DANGER: Are you absolutely sure you want to permanently delete your account? This will permanently wipe all your categories, reports and expense history. This action CANNOT be undone.');">
                    <button type="submit" class="btn btn-danger" style="width: 100%; height: 28px; font-size: 0.75rem; padding: 0;">Delete Account</button>
                </form>
            </div>
        </aside>

        <!-- Main Workspace -->
        <div class="main-wrapper">
            
            <header class="topbar">
                <div sec:authorize="isAuthenticated()" style="font-size: 0.85rem; color: hsl(var(--muted-foreground));">
                    Environment: <strong style="color: hsl(var(--foreground)); font-weight:600;">Production Ledger</strong>
                </div>
            </header>

            <main>
                <div th:replace="${content}"></div>
            </main>

            <footer>
                <p>&copy; 2026 Fintrack Inc. Isolated Tenant Ledger. Powered by Spring Boot 3.3 & Apache POI.</p>
            </footer>
        </div>
    </div>

    <!-- Toast Notification Drawer -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Attach dynamic logic wrapper -->
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
