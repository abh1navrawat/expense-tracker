<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fintrack</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="auth-wrapper">
        <div class="card auth-card">
            
            <div class="auth-header">
                <!-- Premium branding logo -->
                <svg width="40" height="40" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" style="margin-bottom:1rem; color: hsl(var(--foreground));">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <h2>Welcome back</h2>
                <p>Log in to access your financial ledger</p>
            </div>

            <!-- Error Alerts -->
            <div th:if="${error}" style="background: hsl(var(--destructive) / 0.15); border: 1px solid hsl(var(--destructive)); color: hsl(0 0% 98%); padding: 0.75rem; border-radius: var(--radius); font-size: 0.85rem; margin-bottom: 1.25rem; text-align: center;" th:text="${error}"></div>
            <!-- Success Alerts -->
            <div th:if="${success}" style="background: hsl(160 60% 45% / 0.15); border: 1px solid hsl(160 60% 45%); color: hsl(0 0% 98%); padding: 0.75rem; border-radius: var(--radius); font-size: 0.85rem; margin-bottom: 1.25rem; text-align: center;" th:text="${success}"></div>

            <!-- Login Form -->
            <form th:action="@{/api/auth/login}" method="POST">
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input class="form-control" type="email" id="email" name="email" placeholder="name@tracker.com" required autocomplete="email">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrapper">
                        <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle Password Visibility">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; height: 40px; font-weight:600;">Log In</button>
            </form>

            <script>
                function togglePasswordVisibility(fieldId, btnEl) {
                    const passInput = document.getElementById(fieldId);
                    if (!passInput) return;
                    
                    const svgEl = btnEl.querySelector('svg');
                    
                    if (passInput.type === 'password') {
                        passInput.type = 'text';
                        // Change to Eye Off style
                        svgEl.innerHTML = `
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        `;
                    } else {
                        passInput.type = 'password';
                        // Change back to Eye open style
                        svgEl.innerHTML = `
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        `;
                    }
                }
            </script>

            <!-- Pre-seeded Accounts -->
            <div style="background: hsl(var(--secondary) / 0.4); border: 1px solid hsl(var(--border)); padding: 0.85rem; border-radius: var(--radius); margin-top: 1.5rem; font-size: 0.8rem; color: hsl(var(--muted-foreground));">
                <div style="font-weight:600; color: hsl(var(--foreground)); margin-bottom:0.35rem;">Demo Credentials:</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:0.15rem;">
                    <span>User: <strong>user@tracker.com</strong></span>
                    <span>Pass: <strong>password</strong></span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>Admin: <strong>admin@tracker.com</strong></span>
                    <span>Pass: <strong>password</strong></span>
                </div>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/register">Create an account</a></p>
            </div>

        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
