# Spring Application Name
spring.application.name=expense-tracker

# Server configuration
server.port=8080

# PostgreSQL Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/expense_tracker
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate DDL Auto Table creation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring MVC & Thymeleaf settings
spring.thymeleaf.cache=false

# Spring Mail Server configuration (Placeholders - ready to fill)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Security JWT configuration (Base64 encoded 256-bit key)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Reports Directory Path (Stores background generated reports)
reports.storage.dir=./reports/

# Error view handling
server.error.include-stacktrace=never
